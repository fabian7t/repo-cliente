name: Pipeline de Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: fabian777omg/proyecto-final:latest

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Kubeconfig
        run: |
          aws eks update-kubeconfig --region us-east-1 --name tu-cluster-eks || echo "Using local K3s context"

      - name: Deploy and Validate
        run: |
          kubectl apply -f client.yaml
          if ! kubectl rollout status deployment/api-cliente --timeout=3m; then
            kubectl rollout undo deployment/api-cliente
            exit 1
          fi