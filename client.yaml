apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-cliente
  labels:
    app: api-cliente
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-cliente
  template:
    metadata:
      labels:
        app: api-cliente
    spec:
      containers:
      - name: cliente-container
        image: fabian777omg/proyecto-final:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          timeoutSeconds: 5
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          timeoutSeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-cliente-service
spec:
  type: NodePort
  selector:
    app: api-cliente
  ports:
    - port: 80
      targetPort: 80
      nodePort: 32230