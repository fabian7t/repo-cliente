apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-cliente-blue
  labels:
    app: api-cliente
    version: blue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-cliente
      version: blue
  template:
    metadata:
      labels:
        app: api-cliente
        version: blue
    spec:
      containers:
      - name: cliente-container
        image: fabian777omg/proyecto-final:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
