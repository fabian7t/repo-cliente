name: Pipeline de Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Tests
        run: |
          echo "Ejecutando tests de la aplicación..."
          exit 0

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: fabian777omg/proyecto-final:latest

      - name: Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to k3s
        id: deploy
        run: |
          kubectl apply -f client.yaml
          kubectl rollout status deployment/api-cliente --timeout=60s

      - name: Rollback automatico
        if: failure()
        run: |
          kubectl rollout undo deployment/api-cliente
          kubectl rollout status deployment/api-cliente --timeout=60s